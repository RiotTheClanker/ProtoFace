name: PlatformIO CI
on:
  push:
    branches: [ "master", "Mk3-Protogen", "Mk2-Protogen" ]
    paths:
      - 'src/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'src/**'
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layout: [14]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO Core
        run: pip install platformio
      - name: Build firmware (Layout ${{ matrix.layout }})
        env:
          PLATFORMIO_BUILD_FLAGS: -DPROTOGEN_LAYOUT=${{ matrix.layout }}
        run: pio run
      - name: Upload firmware (Layout ${{ matrix.layout }})
        uses: actions/upload-artifact@v4
        with:
          name: ProtoFace-firmware-layout-${{ matrix.layout }}-${{ github.sha }}
          path: |
            .pio/build/rpipico2w/firmware.uf2
            .pio/build/rpipico2w/firmware.elf
          if-no-files-found: warn
